name: Build and release Windows installer
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release-windows:
    runs-on: windows-latest
    env:
      PYTHON_VERSION: "3.10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PySide6 pypdf requests

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Build exe with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon=app_icon.ico main.py
          mkdir release_artifacts
          copy dist\main.exe release_artifacts\PDFConverter.exe
        shell: cmd

      - name: Install NSIS and build installer
        shell: powershell
        run: |
          choco install nsis -y
          $makensis = $null
          $searchPaths = @(
            "$env:ChocolateyInstall\lib\nsis\tools",
            "$env:ProgramFiles\NSIS",
            "${env:ProgramFiles(x86)}\NSIS"
          )
          foreach ($p in $searchPaths) {
            $found = Get-ChildItem -Path $p -Recurse -Filter makensis.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $makensis = $found.FullName; break }
          }
          if (-not $makensis) { throw "makensis.exe not found after NSIS installation" }
          Write-Host "Found makensis at: $makensis"
          & $makensis installer.nsi
          $version = "$env:TAG"
          Rename-Item -Path "release_artifacts\PDFConverter-setup.exe" -NewName "PDFConverter-setup-$version.exe"
        env:
          TAG: ${{ steps.get_version.outputs.TAG }}

      - name: Compute SHA256
        shell: powershell
        run: |
          $version = "$env:TAG"
          $hash = (Get-FileHash -Path "release_artifacts\PDFConverter-setup-$version.exe" -Algorithm SHA256).Hash
          Set-Content -Path "release_artifacts\PDFConverter-setup-$version.exe.sha256" -Value $hash
        env:
          TAG: ${{ steps.get_version.outputs.TAG }}

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Automated release for ${{ github.ref_name }}"
          files: |
            release_artifacts/PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe
            release_artifacts/PDFConverter-setup-${{ steps.get_version.outputs.TAG }}.exe.sha256
